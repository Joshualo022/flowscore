<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FlowScore is a quiet browser-based PDF autoscroll practice stand for musicians."
    />
    <meta name="theme-color" content="#f2eee6" />
    <meta property="og:title" content="FlowScore - Hands-free PDF practice" />
    <meta
      property="og:description"
      content="Load a score, set the pace, and keep both hands on the instrument."
    />
    <meta property="og:type" content="website" />
    <title>FlowScore - Hands-free PDF practice</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="home-page">
    <header class="site-header" aria-label="Site header">
      <a class="brand home-brand" href="./index.html" aria-label="FlowScore home">
        <svg class="mark" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle class="mark-frame" cx="24" cy="24" r="20" />
          <path class="mark-line" d="M12 17c7-4 17-4 24 0" />
          <path class="mark-line" d="M12 24c8 4 16 4 24 0" />
          <path class="mark-line" d="M12 31c7-4 17-4 24 0" />
          <circle class="mark-note" cx="18" cy="31" r="4" />
          <path class="mark-stem" d="M22 29V16" />
        </svg>
        <div>
          <p>FlowScore</p>
          <span>PDF autoscroll</span>
        </div>
      </a>
      <nav aria-label="Primary navigation">
        <a href="./app.html">Open stand</a>
      </nav>
    </header>

    <main>
      <section class="home-hero" aria-label="FlowScore introduction">
        <div class="hero-copy">
          <p class="eyebrow">For practice rooms and music stands</p>
          <h1>Sheet music that moves when your hands cannot.</h1>
          <p>
            Load a PDF, set the pace, and let the score scroll with you. No
            account, no clutter, no reaching away from the instrument.
          </p>
          <a class="primary-link" href="./app.html">Start practicing</a>
        </div>

        <div class="score-visual" aria-hidden="true">
          <div class="score-page">
            <div class="score-scroll">
              <span></span><span></span><span></span><span></span><span></span>
              <b></b><b></b><b></b><b></b>
              <i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
        </div>
      </section>

      <section class="home-strip" aria-label="FlowScore values">
        <p>Open PDF</p>
        <p>Set pace</p>
        <p>Keep playing</p>
      </section>
    </main>
  </body>
</html>
