<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Open a local PDF score and practice with hands-free autoscroll."
    />
    <meta name="theme-color" content="#f2eee6" />
    <title>FlowScore - Practice Stand</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="stand-page">
    <main class="app-shell">
      <section class="stage" aria-label="PDF viewer">
        <div class="empty-state" id="emptyState">
          <p class="eyebrow">Practice stand</p>
          <h1>Open a score.</h1>
          <p id="emptyMessage">Choose a PDF to begin. Your file stays in this browser.</p>
          <label class="primary-upload">
            <input id="pdfInput" type="file" accept="application/pdf" />
            Choose PDF
          </label>
        </div>

        <div class="viewer" id="viewer" hidden>
          <div class="paper" id="paper"></div>
        </div>

        <button class="bot-wake" id="botWake" type="button" hidden>
          wake up bo0thoven
        </button>
      </section>

      <aside class="controls" aria-label="Playback controls">
        <div class="brand">
          <svg class="mark" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
            <circle class="mark-frame" cx="24" cy="24" r="20" />
            <path class="mark-line" d="M12 17c7-4 17-4 24 0" />
            <path class="mark-line" d="M12 24c8 4 16 4 24 0" />
            <path class="mark-line" d="M12 31c7-4 17-4 24 0" />
            <circle class="mark-note" cx="18" cy="31" r="4" />
            <path class="mark-stem" d="M22 29V16" />
          </svg>
          <div>
            <p>FlowScore</p>
            <span><a href="./index.html">Home</a></span>
          </div>
        </div>

        <button
          class="controls-mode-toggle"
          id="controlsModeToggle"
          type="button"
          aria-pressed="false"
        >
          Mini controls
        </button>

        <label class="file-picker">
          <input id="pdfInputCompact" type="file" accept="application/pdf" />
          <span>Open PDF</span>
        </label>

        <button class="play-button" id="playButton" type="button" disabled>
          <span id="playIcon">Play</span>
        </button>

        <p class="status-line" id="statusLine" role="status" aria-live="polite">
          Waiting for a score.
        </p>

        <div class="control-group">
          <div class="label-row">
            <div class="label-title">
              <label for="speedRange">Scroll pace</label>
              <button
                class="inline-tool"
                id="paceCalcToggle"
                type="button"
                aria-expanded="false"
                aria-controls="paceCalculator"
              >
                calculate
              </button>
            </div>
            <output id="speedValue" for="speedRange">24 px/s</output>
          </div>
          <input id="speedRange" type="range" min="4" max="90" value="24" />
          <div class="pace-calculator" id="paceCalculator" hidden>
            <div class="mini-field">
              <label for="calcBpm">BPM (quarter)</label>
              <input id="calcBpm" type="number" min="20" max="260" value="84" inputmode="decimal" />
            </div>
            <div class="mini-field">
              <label>Time signature</label>
              <div class="time-signature-inputs">
                <input
                  id="calcBeats"
                  type="number"
                  min="1"
                  max="16"
                  value="4"
                  aria-label="Beats per measure"
                  inputmode="numeric"
                />
                <span>/</span>
                <input
                  id="calcBeatUnit"
                  type="number"
                  min="1"
                  max="16"
                  value="4"
                  aria-label="Beat unit"
                  inputmode="numeric"
                />
              </div>
            </div>
            <div class="mini-field">
              <label for="calcMeasuresLine">Measures per line</label>
              <input
                id="calcMeasuresLine"
                type="number"
                min="1"
                max="16"
                step="0.5"
                value="4"
                inputmode="decimal"
              />
            </div>
            <div class="mini-field">
              <label for="calcLinesPage">Lines per sheet</label>
              <input id="calcLinesPage" type="number" min="1" max="20" value="5" inputmode="numeric" />
            </div>
            <button class="secondary-action" id="paceCalcApply" type="button">
              Use calculated pace
            </button>
            <p class="calculator-result" id="paceCalcResult">
              Open a PDF first for the most accurate pace.
            </p>
          </div>
        </div>

        <div class="control-group">
          <div class="label-row">
            <label for="zoomRange">Page size</label>
            <output id="zoomValue" for="zoomRange">110%</output>
          </div>
          <input id="zoomRange" type="range" min="70" max="180" value="110" />
        </div>

        <div class="button-grid">
          <button id="backButton" type="button" disabled>
            <span aria-hidden="true">↶ 10</span>
            <span class="sr-only">Back 10 seconds</span>
          </button>
          <button id="forwardButton" type="button" disabled>
            <span aria-hidden="true">10 ↷</span>
            <span class="sr-only">Forward 10 seconds</span>
          </button>
          <button id="topButton" type="button" disabled>Top</button>
        </div>

        <div class="tips" aria-label="Shortcuts">
          <p>Space pauses or resumes. Left and right nudge the pace. Home returns to the top.</p>
        </div>
      </aside>
    </main>

    <aside class="bot-toast" id="botToast" aria-live="polite" hidden>
      <div class="bot-avatar" aria-hidden="true">
        <span></span>
      </div>
      <div class="bot-copy">
        <p class="bot-name">bo0thoven</p>
        <p id="botMessage"></p>
      </div>
      <div class="bot-actions">
        <button id="botClose" type="button" aria-label="Close bo0thoven message">Close</button>
        <button id="botSilence" type="button">Silence</button>
      </div>
    </aside>

    <script src="./script.js" type="module"></script>
  </body>
</html>
