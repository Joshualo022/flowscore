<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Open a local PDF score and practice with hands-free autoscroll."
    />
    <meta name="theme-color" content="#f2eee6" />
    <title>FlowScore - Practice Stand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="stand-page">
    <main class="app-shell">
      <section class="stage" aria-label="PDF viewer">
        <div class="empty-state" id="emptyState">
          <p class="eyebrow">Practice stand</p>
          <h1>Open a score.</h1>
          <p id="emptyMessage">Choose a PDF to begin. Your file stays in this browser.</p>
          <label class="primary-upload">
            <input id="pdfInput" type="file" accept="application/pdf" />
            Choose PDF
          </label>
        </div>

        <div class="viewer" id="viewer" hidden>
          <div class="paper" id="paper"></div>
        </div>
      </section>

      <aside class="controls" aria-label="Playback controls">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <div>
            <p>FlowScore</p>
            <span><a href="./index.html">Home</a></span>
          </div>
        </div>

        <label class="file-picker">
          <input id="pdfInputCompact" type="file" accept="application/pdf" />
          <span>Open PDF</span>
        </label>

        <button class="play-button" id="playButton" type="button" disabled>
          <span id="playIcon">Play</span>
        </button>

        <p class="status-line" id="statusLine" role="status" aria-live="polite">
          Waiting for a score.
        </p>

        <div class="control-group">
          <div class="label-row">
            <label for="speedRange">Scroll pace</label>
            <output id="speedValue" for="speedRange">24 px/s</output>
          </div>
          <input id="speedRange" type="range" min="4" max="90" value="24" />
        </div>

        <div class="control-group">
          <div class="label-row">
            <label for="zoomRange">Page size</label>
            <output id="zoomValue" for="zoomRange">110%</output>
          </div>
          <input id="zoomRange" type="range" min="70" max="180" value="110" />
        </div>

        <div class="button-grid">
          <button id="backButton" type="button" disabled>-10s</button>
          <button id="topButton" type="button" disabled>Top</button>
        </div>

        <div class="tips" aria-label="Shortcuts">
          <p>Space pauses or resumes. Arrow keys nudge the pace. Home returns to the top.</p>
        </div>
      </aside>
    </main>
    <script src="./script.js" type="module"></script>
  </body>
</html>
